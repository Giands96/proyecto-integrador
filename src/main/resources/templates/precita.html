<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Precita | Importación</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(180deg, #eef5f0 0%, #f7faf8 100%);
            font-family: Arial, sans-serif;
            color: #24332b;
        }

        .navbar-custom {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            padding: 14px 24px;
        }

        .navbar-brand {
            font-size: 28px;
            font-weight: 800;
            color: #18a558 !important;
            letter-spacing: 0.5px;
        }

        .nav-link {
            color: #44554c !important;
            font-weight: 700;
            margin-left: 18px;
            transition: 0.2s ease;
        }

        .nav-link:hover,
        .nav-link.active-link {
            color: #198754 !important;
        }

        .hero-mini {
            max-width: 1150px;
            margin: 28px auto 18px auto;
            padding: 26px 28px;
            border-radius: 24px;
            background: linear-gradient(135deg, #198754 0%, #26b36a 100%);
            color: white;
            box-shadow: 0 12px 30px rgba(25, 135, 84, 0.18);
        }

        .hero-mini h1 {
            font-size: 38px;
            font-weight: 800;
            margin: 0 0 8px 0;
        }

        .hero-mini p {
            margin: 0;
            font-size: 17px;
            opacity: 0.95;
        }

        .content-wrap {
            max-width: 1150px;
            margin: 0 auto 30px auto;
        }

        .card-custom {
            background: #ffffff;
            border: 1px solid #edf2ee;
            border-radius: 22px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.06);
            padding: 28px;
            margin-bottom: 22px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
        }

        .section-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: #e8f7ee;
            color: #198754;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .section-header h5 {
            margin: 0;
            font-size: 29px;
            font-weight: 800;
            color: #1d3528;
        }

        .section-header p {
            margin: 2px 0 0 0;
            color: #6f7f75;
            font-size: 14px;
        }

        .form-label {
            font-weight: 700;
            color: #36463d;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 14px;
            min-height: 48px;
            border: 1px solid #d7e3db;
            box-shadow: none;
        }

        .form-control:focus {
            border-color: #61c48e;
            box-shadow: 0 0 0 0.2rem rgba(25, 135, 84, 0.12);
        }

        .campo-bloqueado {
            background: #eef8f0;
            border: 1px solid #b8dfc1;
        }

        .btn-buscar {
            min-width: 150px;
            min-height: 48px;
            border-radius: 14px;
            font-weight: 700;
            box-shadow: 0 10px 18px rgba(25, 135, 84, 0.16);
        }

        .helper-box {
            background: #f5faf7;
            border: 1px dashed #c8ddd0;
            border-radius: 16px;
            padding: 14px 16px;
            color: #597065;
            font-size: 14px;
            margin-top: 18px;
        }

        .table-card {
            overflow: hidden;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background: linear-gradient(135deg, #d6e8df 0%, #c8ddd3 100%);
            color: #15241c;
            text-align: center;
            vertical-align: middle;
            font-weight: 800;
            border-color: #d8e7de;
            padding: 14px 10px;
        }

        .table tbody td {
            text-align: center;
            vertical-align: middle;
            padding: 16px 10px;
            border-color: #eef3ef;
        }

        .table tbody tr:hover {
            background: #f9fcfa;
        }

        .tabla-vacia {
            color: #7b8d82;
            padding: 28px 0 !important;
            font-size: 15px;
        }

        .badge-soft {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #eaf8ef;
            color: #198754;
            border-radius: 999px;
            padding: 8px 14px;
            font-weight: 700;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .hero-mini h1 {
                font-size: 28px;
            }

            .section-header h5 {
                font-size: 22px;
            }

            .navbar-brand {
                font-size: 24px;
            }

            .nav-link {
                margin-left: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>


<!-- NAVBAR SUPERIOR -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm px-4">
    <a class="navbar-brand" href="/inicio">RANSA</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a href="/inicio" class="nav-link">INICIO</a></li>
            <li class="nav-item"><a href="/precita" class="nav-link active text-success">IMPORTACIÓN</a></li>
        </ul>
    </div>
</nav>

<div class="container py-4">

    <h4 class="fw-semibold mb-3 text-success">Precita | Importación</h4>

    <!-- FORMULARIO PARA BUSCAR CLIENTE / AGENCIA / BL -->
    <div class="card shadow-sm p-4 mb-4">
        <form class="row g-3">

            <!-- CLIENTE -->
            <div class="col-md-4">
                <label class="form-label">Cliente</label>
                <!-- Campo con autocompletado -->
                <input list="listaClientes" id="inputCliente" class="form-control">
                <datalist id="listaClientes"></datalist>
            </div>

            <div class="col-md-4">
                <label class="form-label">Código de Cliente (RUC)</label>
                <!-- RUC autocompletado automáticamente -->
                <input type="text" id="rucCliente" class="form-control" readonly>
            </div>

            <!-- AGENCIA -->
            <div class="col-md-4">
                <label class="form-label">Agencia Aduana</label>
                <input list="listaAgencias" id="inputAgencia" class="form-control">
                <datalist id="listaAgencias"></datalist>
            </div>

            <div class="col-md-6">
                <label class="form-label">Código Cliente Aduana (RUC Agencia)</label>
                <input type="text" id="rucAgencia" class="form-control" readonly>
            </div>

            <!-- BL (Documento de transporte) -->
            <div class="col-md-6">
                <label class="form-label">Doc. de Transporte (BL)</label>
                <input type="text" id="inputBL" class="form-control">
            </div>

            <div class="col-12 text-end">
                <!-- Botón para buscar contenedores del BL -->
                <button type="button" class="btn btn-success px-4" id="btnBuscarBL">Buscar</button>
            </div>

        </form>
    </div>

    <!-- TABLA DE CONTENEDORES RESULTANTES DE LA BÚSQUEDA -->
    <div class="card shadow-sm p-3">
        <div class="table-container">
            <table class="table table-striped text-center">
                <thead class="table-success">
                <tr>
                    <th>CONTENEDOR</th>
                    <th>TIPO</th>
                    <th>OPCIONES</th>
                </tr>
                </thead>
                <tbody id="tablaContenedores">
                <tr>
                    <td colspan="3" class="text-muted py-3">No hay información</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- MODAL PARA REGISTRAR CITA -->
<div class="modal fade" id="modalCita" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Registrar Cita</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- Formulario que se enviará al Guardar -->
      <form id="formCita" th:action="@{/cita/guardar}" action="/cita/guardar" method="post">
        <div class="modal-body">
          <div class="row g-3">

            <!-- DATOS DEL CONTENEDOR -->
            <div class="col-md-6">
              <label class="form-label">Número de Contenedor</label>
              <input type="text" id="modalContenedor" name="contenedor" class="form-control" readonly>
            </div>

            <div class="col-md-6">
              <label class="form-label">BL</label>
              <input type="text" id="modalBL" name="bl" class="form-control" readonly>
            </div>

            <!-- PLACA -->
            <div class="col-md-6">
              <label class="form-label">Placa</label>
              <input type="text" name="placa" class="form-control" id="inputPlaca">
              <div id="msgPlaca" class="valid-msg"></div>
            </div>

            <!-- CARRETA -->
            <div class="col-md-6">
              <label class="form-label">Carreta</label>
              <input type="text" name="carreta" class="form-control" id="inputCarreta">
              <div id="msgCarreta" class="valid-msg"></div>
            </div>

            <!-- CHOFER -->
            <div class="col-md-6">
              <label class="form-label">DNI Conductor</label>
              <input type="text" name="dniConductor" id="dniConductor" class="form-control">
            </div>

            <div class="col-md-6">
              <label class="form-label">Nombre del Chofer</label>
              <input type="text" id="nombreConductor" name="nombreConductor" class="form-control" readonly>
            </div>

            <!-- TRANSPORTE -->
            <div class="col-md-6">
                <label class="form-label">RUC Transporte</label>
                <input type="text" id="rucTransporte" name="rucTransporte" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label">Nombre Transporte</label>
                <input type="text" id="nombreTransporte" class="form-control" readonly>
            </div>

            <!-- FECHA -->
            <div class="col-md-6">
              <label class="form-label">Fecha</label>
              <input type="date" id="modalFecha" name="fecha" class="form-control">
            </div>

          </div>
        </div>

        <div class="modal-footer">
          <!-- Botón guardar cita -->
          <button type="submit" class="btn btn-success" id="btnGuardar">Guardar</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        </div>
      </form>

    </div>
  </div>
</div>

<script>
// ==================== AUTOCOMPLETADO CLIENTE ====================
inputCliente.addEventListener("input", async () => {
    let valor = inputCliente.value;
    if (valor.length < 2) return; // Solo busca si escribe mínimo 2 letras

    let res = await fetch("/api/cliente/buscar?nombre="+valor);
    let data = await res.json();

    // Se llena la lista de sugerencias
    listaClientes.innerHTML = "";
    data.forEach(c=>{
        let o=document.createElement("option");
        o.value=c.nombreCliente;
        o.dataset.ruc=c.rucCliente; // Guardamos RUC en atributo
        listaClientes.appendChild(o);
    });

    // Si el usuario selecciona un cliente → llenar RUC
    listaClientes.querySelectorAll("option").forEach(op=>{
        if(op.value===valor){ rucCliente.value=op.dataset.ruc; }
    });
});

// ==================== AUTOCOMPLETADO AGENCIA ====================
inputAgencia.addEventListener("input", async () => {
    let valor = inputAgencia.value;
    if (valor.length < 2) return;

    let res = await fetch("/api/agencia/buscar?nombre="+valor);
    let data = await res.json();

    listaAgencias.innerHTML = "";
    data.forEach(a=>{
        let o=document.createElement("option");
        o.value=a.nombreAgencia;
        o.dataset.ruc=a.rucAgencia;
        listaAgencias.appendChild(o);
    });

    listaAgencias.querySelectorAll("option").forEach(op=>{
        if(op.value===valor){ rucAgencia.value=op.dataset.ruc; }
    });
});

// ==================== BUSCAR CONTENEDORES DEL BL ====================
btnBuscarBL.addEventListener("click", async ()=>{
    let bl=inputBL.value.trim();
    let ruc=rucCliente.value.trim();

    let res=await fetch(`/api/bl/contenedores?bl=${bl}&rucCliente=${ruc}`);
    let data=await res.json();

    tablaContenedores.innerHTML="";
    if(data.length===0){
        tablaContenedores.innerHTML=`<tr><td colspan="3">No hay información</td></tr>`;
        return;
    }

    // Agregar contenedores a tabla
    data.forEach(c=>{
        tablaContenedores.innerHTML += `
        <tr>
            <td>${c.numeroContenedor}</td>
            <td>${c.tipo||''}</td>
            <td><button class="btn btn-success btn-sm btnAbrirModal" data-c="${c.numeroContenedor}">▶</button></td>
        </tr>`;
    });
});

// ==================== ABRIR MODAL CITA ====================
tablaContenedores.addEventListener("click", e=>{
    let btn=e.target.closest(".btnAbrirModal");
    if(!btn) return;

    // Llenar datos en modal
    modalContenedor.value=btn.dataset.c;
    modalBL.value=inputBL.value.trim();
    modalFecha.value = new Date().toISOString().split("T")[0]; // Fecha de hoy

    new bootstrap.Modal(modalCita).show();
});

// ==================== AUTOCARGAR CHOFER POR DNI ====================
dniConductor.addEventListener("input", async () => {
    let dni = dniConductor.value.trim();
    if(dni.length < 8) return;

    let res = await fetch("/api/chofer/buscarDni?dni=" + dni);
    let data = await res.json();

    nombreConductor.value = data?.nombreChofer || "";
});

// ==================== AUTOCARGAR TRANSPORTE POR RUC ====================
rucTransporte.addEventListener("input", async () => {
    let ruc = rucTransporte.value.trim();
    if(ruc.length < 8) return;

    let res = await fetch("/api/transporte/buscarPorRuc?ruc=" + ruc);
    let data = await res.json();

    nombreTransporte.value = data?.nombreEmpresa || "";
});

// ==================== GUARDAR CITA ====================
formCita.addEventListener("submit", async (e) => {
    e.preventDefault(); // Evita recarga

    const cita = {
        numeroContenedor: modalContenedor.value,
        bl: modalBL.value,
        placa: inputPlaca.value,
        carreta: inputCarreta.value,
        dniConductor: dniConductor.value,
        nombreConductor: nombreConductor.value,
        rucTransporte: rucTransporte.value,
        nombreTransporte: nombreTransporte.value,
        rucCliente: rucCliente.value,
        rucAgencia: rucAgencia.value
    };

    let res = await fetch("/cita/guardar", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(cita)
    });

    if(res.ok){
        alert("✅ Cita guardada correctamente!");
        modalCita.querySelector(".btn-close").click();
    } else {
        alert("❌ Error al guardar la cita");
    }
});
</script>

<!-- Bootstrap scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
