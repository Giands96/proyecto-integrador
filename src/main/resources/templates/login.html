<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Sistema de Citas</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url('https://www.ransa.biz/wp-content/uploads/2022/06/FOTO-PORTADA-Webinar-Carlos-Ciriani.jpg') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", sans-serif;
        }

        .card-login {
            width: 410px;
            padding: 40px 30px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0px 8px 25px rgb(0, 0, 0);
            animation: fadeIn 0.7s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h3 {
            font-weight: 700;
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            color: white;
        }

        .form-control {
            height: 46px;
            border-radius: 10px;
            background: rgba(255,255,255,0.75);
            border: 1px solid #ccc;
        }

        /* ✅ Borde y sombra verde al hacer clic */
        .form-control:focus {
            border-color: #00a033 !important;
            box-shadow: 0 0 6px rgba(0, 160, 51, 0.7) !important;
            outline: none;
        }

        .btn-login {
            width: 100%;
            height: 46px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            background: rgb(0, 128, 64);
            color: white;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            background: rgb(0, 128, 0);
        }

        .error {
            color: rgb(128, 255, 0);
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="card-login">

    <h3>Acceso al Sistema</h3>

    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <label>Usuario</label>
            <input type="text" name="usuario" class="form-control" required autofocus>
        </div>

        <div class="mb-3">
            <label>Contraseña</label>
            <input type="password" name="clave" class="form-control" required>
        </div>

        <button class="btn-login">Ingresar</button>

    </form>
</div>

</body>
</html>
